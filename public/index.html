<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>HKPL 資源控制台</title>
  <!--[if lt IE 9]>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5shiv/3.7.3/html5shiv.min.js"></script>
  <![endif]-->
  <style>
    /* IE6-8 相容性基礎樣式 */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: "Microsoft YaHei", "SimHei", "Heiti SC", Arial, sans-serif;
      background-color: #667eea;
      min-height: 100vh;
      padding: 20px;
      filter: progid:DXImageTransform.Microsoft.gradient(startColorstr='#667eea', endColorstr='#764ba2', GradientType=1);
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      border: 1px solid #ccc;
      overflow: hidden;
      zoom: 1;
    }
    
    .header {
      background-color: #4facfe;
      color: white;
      padding: 30px;
      text-align: center;
      filter: progid:DXImageTransform.Microsoft.gradient(startColorstr='#4facfe', endColorstr='#00f2fe', GradientType=0);
    }
    .header h1 { font-size: 28px; margin-bottom: 10px; font-weight: bold; }
    .header p { font-size: 14px; filter: alpha(opacity=90); }
    
    /* Float 佈局取代 Flexbox */
    .controls {
      padding: 30px;
      background: #f8f9fa;
      border-bottom: 1px solid #e9ecef;
      overflow: hidden;
      zoom: 1;
    }
    .control-item { float: left; margin-right: 15px; margin-bottom: 10px; }
    
    .book-search-section {
      padding: 20px 30px;
      background: #fff8e6;
      border-bottom: 2px dashed #ffd700;
      overflow: hidden;
      zoom: 1;
    }
    .book-search-section h3 {
      color: #856404;
      font-size: 16px;
      margin-right: 10px;
      float: left;
      line-height: 40px;
    }
    .input-group { float: left; width: 400px; }
    .input-group input {
      width: 250px;
      padding: 12px 16px;
      border: 2px solid #ffc107;
      font-size: 16px;
      float: left;
      margin-right: 10px;
      line-height: 16px;
    }
    
    .btn {
      padding: 14px 28px;
      border: none;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      background-color: #11998e;
      color: white;
      display: inline-block;
      *display: inline;
      zoom: 1;
      filter: progid:DXImageTransform.Microsoft.gradient(startColorstr='#11998e', endColorstr='#38ef7d', GradientType=0);
    }
    .btn:hover { background-color: #0d7a6e; }
    .btn:disabled { filter: alpha(opacity=60); cursor: not-allowed; }
    .btn-orange {
      background-color: #f093fb;
      filter: progid:DXImageTransform.Microsoft.gradient(startColorstr='#f093fb', endColorstr='#f5576c', GradientType=0);
    }
    .btn-blue {
      background-color: #4facfe;
      filter: progid:DXImageTransform.Microsoft.gradient(startColorstr='#4facfe', endColorstr='#00f2fe', GradientType=0);
    }
    
    .status {
      padding: 8px 16px;
      font-size: 13px;
      font-weight: bold;
      display: none;
      float: left;
      margin-top: 10px;
    }
    .status.show { display: inline-block; }
    .status.loading { background: #fff3cd; color: #856404; }
    .status.success { background: #d4edda; color: #155724; }
    .status.error { background: #f8d7da; color: #721c24; }
    
    .results { padding: 30px; }
    .result-section { margin-bottom: 30px; }
    .result-section h3 {
      color: #495057;
      margin-bottom: 20px;
      font-size: 20px;
      border-left: 4px solid #667eea;
      padding-left: 12px;
      overflow: hidden;
      zoom: 1;
    }
    .result-title-extra { font-size: 14px; color: #6c757d; float: right; }
    
    .book-info-card {
      background: #f5f7fa;
      border: 1px solid #c3cfe2;
      padding: 20px;
      margin-bottom: 20px;
      border-left: 5px solid #667eea;
    }
    .book-title { font-size: 24px; font-weight: bold; color: #2c3e50; margin-bottom: 15px; }
    
    /* Table 佈局取代 Grid */
    .book-details-table { width: 100%; margin-bottom: 20px; }
    .book-details-table td { width: 25%; padding: 10px; vertical-align: top; }
    .detail-item { background: white; padding: 10px 15px; border: 1px solid #ddd; }
    .detail-label { font-size: 12px; color: #6c757d; margin-bottom: 4px; }
    .detail-value { font-size: 14px; font-weight: bold; color: #2c3e50; }
    
    .stats-bar {
      background: #e9ecef;
      padding: 15px 20px;
      margin-bottom: 20px;
      font-size: 16px;
      color: #495057;
      overflow: hidden;
      zoom: 1;
    }
    .stats-item { float: left; margin-right: 30px; }
    .stats-bar strong { color: #155724; font-size: 20px; margin-right: 5px; }
    
    table { width: 100%; border-collapse: collapse; background: white; border: 1px solid #e9ecef; font-size: 14px; }
    th, td { padding: 14px 16px; text-align: left; border-bottom: 1px solid #e9ecef; }
    th { background: #f8f9fa; font-weight: bold; color: #495057; font-size: 12px; text-transform: uppercase; }
    
    .status-badge { display: inline-block; padding: 4px 12px; font-size: 12px; font-weight: bold; }
    .status-available { background: #d4edda; color: #155724; }
    .status-loaned { background: #fff3cd; color: #856404; }
    .status-reserve { background: #f8d7da; color: #721c24; }
    .status-processing { background: #cce5ff; color: #004085; }
    
    .badge { display: inline-block; padding: 4px 12px; font-size: 12px; font-weight: bold; }
    .badge-ebook { background: #d4edda; color: #155724; }
    .badge-db { background: #cce5ff; color: #004085; }
    
    .empty { text-align: center; color: #6c757d; padding: 60px 20px; font-style: italic; background: #f8f9fa; border: 1px solid #ddd; }
    .location-list { overflow: hidden; zoom: 1; }
    .location-tag { float: left; padding: 2px 8px; background: #e9ecef; margin: 2px; font-size: 12px; color: #495057; }
    
    a { color: #667eea; text-decoration: none; }
    a:hover { text-decoration: underline; }
    
    .loading-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background-color: white;
      filter: alpha(opacity=90);
      display: none;
      z-index: 1000;
    }
    .loading-overlay.show { display: block; }
    .spinner-container { position: absolute; top: 50%; left: 50%; margin-top: -25px; margin-left: -25px; }
    .spinner { width: 50px; height: 50px; border: 4px solid #f3f3f3; border-top: 4px solid #667eea; }
    
    .clearfix { clear: both; height: 0; overflow: hidden; }
    * html .clearfix { zoom: 1; }
    *+html .clearfix { zoom: 1; }
  </style>
</head>
<body>
  <div class="loading-overlay" id="loading">
    <div class="spinner-container"><div class="spinner"></div></div>
  </div>
  
  <div class="container">
    <div class="header">
      <h1>HKPL 資源控制台</h1>
      <p>香港公共圖書館電子資源 & 館藏查詢系統</p>
    </div>
    
    <div class="book-search-section">
      <h3>圖書館藏查詢 (API 2)</h3>
      <div class="input-group">
        <input type="text" id="bookIdInput" placeholder="請輸入書籍 ID (例如: 3780306)" value="">
        <button class="btn btn-orange" onclick="fetchBookData()" id="btnBookSearch">查詢書籍</button>
      </div>
      <span class="status" id="bookStatus">就緒</span>
      <div class="clearfix"></div>
    </div>
    
    <div class="controls">
      <div class="control-item">
        <button class="btn btn-blue" onclick="fetchData()" id="btnFetch">抓取 HKPL 電子資源 (API 1)</button>
      </div>
      <div class="control-item">
        <span class="status" id="status">就緒</span>
      </div>
      <div class="clearfix"></div>
    </div>
    
    <div class="results">
      <div class="result-section" id="bookSection" style="display:none;">
        <h3>書籍詳情<span id="bookTotal" class="result-title-extra"></span></h3>
        <div id="bookResult"><p class="empty">請輸入書籍 ID 並點擊查詢</p></div>
      </div>
      
      <div class="result-section">
        <h3>電子書平台 (Port 8000)<span id="ebookCount" class="result-title-extra"></span></h3>
        <div id="ebookResult"><p class="empty">點擊「抓取 HKPL 電子資源」按鈕獲取數據</p></div>
      </div>
      
      <div class="result-section">
        <h3>電子資料庫 (Port 8000)<span id="dbCount" class="result-title-extra"></span></h3>
        <div id="dbResult"><p class="empty">等待數據載入...</p></div>
      </div>
    </div>
  </div>

  <script>
    // ES5 語法相容 IE6-8
    function getEl(id) { return document.getElementById(id); }
    
    function setLoading(show) {
      getEl('loading').style.display = show ? 'block' : 'none';
      getEl('btnFetch').disabled = show;
      getEl('btnBookSearch').disabled = show;
    }
    
    function setBookStatus(msg, type) {
      var status = getEl('bookStatus');
      status.innerHTML = msg;
      status.className = 'status show ' + type;
      if (type === 'success' || type === 'error') {
        setTimeout(function() { status.className = 'status'; }, 5000);
      }
    }
    
    function setStatus(msg, type) {
      var status = getEl('status');
      status.innerHTML = msg;
      status.className = 'status show ' + type;
      if (type === 'success' || type === 'error') {
        setTimeout(function() { status.className = 'status'; }, 5000);
      }
    }

    function fetchBookData() {
      var bookId = getEl('bookIdInput').value;
      if (!bookId || bookId === '') {
        setBookStatus('請輸入書籍 ID', 'error');
        return;
      }
      
      setLoading(true);
      setBookStatus('查詢中...', 'loading');
      getEl('bookSection').style.display = 'block';
      getEl('bookResult').innerHTML = '<p class="empty">載入中...</p>';
      
      var xhr = new XMLHttpRequest();
      xhr.open('GET', '/api/proxy?target=8081&endpoint=book/' + encodeURIComponent(bookId), true);
      xhr.setRequestHeader('X-API-Key', 'HKPL2024SecureKey');
      
      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
          if (xhr.status === 200) {
            try {
              var result = JSON.parse(xhr.responseText);
              var bookData = result.data || result;
              if (bookData['書本名稱']) {
                renderBookData(bookData);
                setBookStatus('查詢成功！', 'success');
              } else {
                setBookStatus('返回數據格式異常', 'error');
              }
            } catch (e) {
              setBookStatus('數據解析失敗: ' + e.message, 'error');
            }
          } else if (xhr.status === 403) {
            setBookStatus('API Key 無效', 'error');
          } else if (xhr.status === 404) {
            setBookStatus('找不到書籍', 'error');
          } else {
            try {
              var err = JSON.parse(xhr.responseText);
              setBookStatus('錯誤: ' + (err.error || xhr.status), 'error');
            } catch(e) {
              setBookStatus('查詢失敗 (' + xhr.status + ')', 'error');
            }
          }
          setLoading(false);
        }
      };
      
      xhr.onerror = function() {
        setBookStatus('網絡錯誤，請檢查 Proxy 服務與 CasaOS 連接', 'error');
        setLoading(false);
      };
      
      xhr.send();
    }

    function renderBookData(data) {
      var html = '<div class="book-info-card">';
      html += '<div class="book-title">' + escapeHtml(data['書本名稱'] || '未知書名') + '</div>';
      
      var details = data['書目詳情'] || {};
      html += '<table class="book-details-table"><tr>';
      
      var fields = ['館藏編目號碼', '索書號', '著者', '著錄', '出版地', '出版者', '出版年份', '叢書名', '其他著者', '書刊別名', '標準號碼', '附加叢書名稱', '附註', '語言'];
      var count = 0;
      
      for (var i = 0; i < fields.length; i++) {
        var field = fields[i];
        var value = details[field];
        if (value && value !== '--') {
          if (count > 0 && count % 4 === 0) html += '</tr><tr>';
          html += '<td><div class="detail-item">';
          html += '<div class="detail-label">' + escapeHtml(field) + '</div>';
          html += '<div class="detail-value">' + escapeHtml(value) + '</div>';
          html += '</div></td>';
          count++;
        }
      }
      while (count % 4 !== 0) { html += '<td></td>'; count++; }
      html += '</tr></table></div>';
      
      var libraries = data['館藏列表'] || [];
      getEl('bookTotal').innerHTML = '館藏地點: ' + libraries.length + ' 個';
      
      if (libraries.length > 0) {
        html += '<div class="stats-bar">';
        var available = 0;
        for (var j = 0; j < libraries.length; j++) {
          if (libraries[j]['館藏現況'] && libraries[j]['館藏現況'].indexOf('可供借閱') !== -1) available++;
        }
        html += '<div class="stats-item">總館藏: <strong>' + libraries.length + '</strong> 個地點</div>';
        html += '<div class="stats-item">可借閱: <strong>' + available + '</strong> 個</div>';
        html += '<div class="clearfix"></div></div>';
        
        html += '<table><thead><tr>';
        html += '<th width="35%">圖書館</th>';
        html += '<th width="20%">索書號</th>';
        html += '<th width="25%">館藏現況</th>';
        html += '<th width="20%">館藏位置</th>';
        html += '</tr></thead><tbody>';
        
        for (var k = 0; k < libraries.length; k++) {
          var item = libraries[k];
          var statusClass = 'status-processing';
          var statusText = item['館藏現況'] || '--';
          if (statusText.indexOf('可供借閱') !== -1) statusClass = 'status-available';
          else if (statusText.indexOf('已借出') !== -1) statusClass = 'status-loaned';
          else if (statusText.indexOf('預約') !== -1) statusClass = 'status-reserve';
          
          html += '<tr>';
          html += '<td><strong>' + escapeHtml(item['圖書館']) + '</strong></td>';
          html += '<td><code>' + escapeHtml(item['索書號']) + '</code></td>';
          html += '<td><span class="status-badge ' + statusClass + '">' + escapeHtml(statusText) + '</span></td>';
          html += '<td>' + escapeHtml(item['館藏'] || '--') + '</td>';
          html += '</tr>';
        }
        html += '</tbody></table>';
      } else {
        html += '<p class="empty">無館藏資料</p>';
      }
      getEl('bookResult').innerHTML = html;
    }

    function fetchData() {
      setLoading(true);
      setStatus('連接中...', 'loading');
      getEl('ebookResult').innerHTML = '<p class="empty">載入中...</p>';
      getEl('dbResult').innerHTML = '<p class="empty">載入中...</p>';
      
      var xhr = new XMLHttpRequest();
      xhr.open('POST', '/api/proxy?target=8000&endpoint=scrape', true);
      xhr.setRequestHeader('Content-Type', 'application/json');
      xhr.setRequestHeader('X-API-Key', 'HKPL2024SecureKey');
      
      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
          if (xhr.status === 200) {
            try {
              var result = JSON.parse(xhr.responseText);
              if (result.success && result.data) {
                renderData(result.data);
                setStatus('抓取成功！', 'success');
              } else {
                setStatus('數據格式錯誤', 'error');
              }
            } catch (e) {
              setStatus('解析失敗', 'error');
            }
          } else {
            setStatus('連接失敗 (' + xhr.status + ')', 'error');
          }
          setLoading(false);
        }
      };
      
      xhr.onerror = function() {
        setStatus('網絡錯誤', 'error');
        setLoading(false);
      };
      
      xhr.send('{}');
    }

    function renderData(data) {
      var ebooks = data.ebooks || [];
      var databases = data.edatabases || [];
      
      getEl('ebookCount').innerHTML = '共 ' + ebooks.length + ' 個';
      getEl('dbCount').innerHTML = '共 ' + databases.length + ' 個';
      
      if (ebooks.length > 0) {
        var html = '<div class="stats-bar">';
        html += '<div class="stats-item">電子書: <strong>' + ebooks.length + '</strong> 個</div>';
        html += '<div class="clearfix"></div></div>';
        html += '<table><thead><tr><th width="15%">類型</th><th width="50%">標題</th><th width="35%">鏈接</th></tr></thead><tbody>';
        
        for (var i = 0; i < ebooks.length; i++) {
          var item = ebooks[i];
          var cat = item.category || '電子書';
          var badgeClass = cat.indexOf('英文') !== -1 ? 'badge-db' : 'badge-ebook';
          html += '<tr>';
          html += '<td><span class="badge ' + badgeClass + '">' + escapeHtml(cat) + '</span></td>';
          html += '<td>' + escapeHtml(item.title) + '</td>';
          html += '<td><a href="' + (item.link || '#') + '" target="_blank">查看資源</a></td>';
          html += '</tr>';
        }
        html += '</tbody></table>';
        getEl('ebookResult').innerHTML = html;
      } else {
        getEl('ebookResult').innerHTML = '<p class="empty">無電子書數據</p>';
      }
      
      if (databases.length > 0) {
        var html = '<div class="stats-bar">';
        html += '<div class="stats-item">數據庫: <strong>' + databases.length + '</strong> 個</div>';
        html += '<div class="clearfix"></div></div>';
        html += '<table><thead><tr><th width="35%">標題</th><th width="45%">使用地點</th><th width="20%">標籤</th></tr></thead><tbody>';
        
        for (var j = 0; j < databases.length; j++) {
          var db = databases[j];
          var locs = db.locations || [];
          var tags = db.tags || [];
          
          var locHtml = '<div class="location-list">';
          if (locs.length > 0) {
            for (var k = 0; k < locs.length; k++) {
              locHtml += '<span class="location-tag">' + escapeHtml(locs[k]) + '</span>';
            }
          } else {
            locHtml += '<span style="color:#6c757d;">-</span>';
          }
          locHtml += '<div class="clearfix"></div></div>';
          
          var tagStr = '';
          for (var t = 0; t < Math.min(tags.length, 5); t++) {
            if (t > 0) tagStr += ', ';
            tagStr += tags[t];
          }
          if (tags.length > 5) tagStr += '...';
          
          html += '<tr>';
          html += '<td><strong>' + escapeHtml(db.title) + '</strong></td>';
          html += '<td>' + locHtml + '</td>';
          html += '<td>' + escapeHtml(tagStr) + '</td>';
          html += '</tr>';
        }
        html += '</tbody></table>';
        getEl('dbResult').innerHTML = html;
      } else {
        getEl('dbResult').innerHTML = '<p class="empty">無數據庫數據</p>';
      }
    }
    
    function escapeHtml(text) {
      if (!text) return '-';
      var div = document.createElement('div');
      div.appendChild(document.createTextNode(text));
      return div.innerHTML;
    }
  </script>
</body>
</html>
