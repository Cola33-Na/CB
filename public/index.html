<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HKPL 資源控制台 v2.2 - Excel 表格版</title>
  
  <!-- SheetJS for Excel export -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    :root {
      --primary: #667eea;
      --primary-dark: #5a67d8;
      --secondary: #764ba2;
      --accent-orange: #f093fb;
      --accent-blue: #4facfe;
      --success: #48bb78;
      --warning: #ed8936;
      --danger: #f56565;
      --bg: #f7fafc;
      --card-bg: #ffffff;
      --text: #2d3748;
      --text-muted: #718096;
      --border: #e2e8f0;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", "PingFang HK", sans-serif;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      min-height: 100vh;
      padding: 20px;
      color: var(--text);
    }
    
    .container {
      max-width: 1400px;
      margin: 0 auto;
      background: var(--card-bg);
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      overflow: hidden;
    }
    
    /* Header */
    .header {
      background: linear-gradient(90deg, var(--accent-blue) 0%, #00f2fe 100%);
      color: white;
      padding: 30px;
      text-align: center;
      position: relative;
    }
    
    .header h1 {
      font-size: 28px;
      margin-bottom: 8px;
      font-weight: 700;
    }
    
    .header p {
      font-size: 14px;
      opacity: 0.9;
    }
    
    /* Network Status Indicator */
    .network-status {
      position: absolute;
      top: 20px;
      right: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: rgba(255,255,255,0.2);
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    
    .network-status.offline {
      background: rgba(245, 101, 101, 0.3);
    }
    
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse 2s infinite;
    }
    
    .network-status.offline .status-dot {
      background: var(--danger);
      animation: none;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    /* Tabs */
    .tab-nav {
      display: flex;
      background: #f8fafc;
      border-bottom: 1px solid var(--border);
    }
    
    .tab-btn {
      flex: 1;
      padding: 18px 24px;
      background: none;
      border: none;
      font-size: 16px;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
    }
    
    .tab-btn:hover {
      color: var(--primary);
      background: rgba(102, 126, 234, 0.05);
    }
    
    .tab-btn.active {
      color: var(--primary);
      background: white;
    }
    
    .tab-btn.active::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--primary);
    }
    
    .tab-content {
      display: none;
      padding: 30px;
    }
    
    .tab-content.active {
      display: block;
    }
    
    /* Tab 1: Scrape */
    .auto-fetch-banner {
      background: linear-gradient(90deg, #e0e7ff 0%, #c7d2fe 100%);
      border-left: 4px solid var(--primary);
      padding: 16px 20px;
      margin-bottom: 24px;
      border-radius: 8px;
      display: none;
      justify-content: space-between;
      align-items: center;
    }
    
    .auto-fetch-banner.show {
      display: flex;
    }
    
    .auto-fetch-banner .message {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #3730a3;
      font-size: 14px;
      font-weight: 600;
    }
    
    .control-panel {
      background: #f8fafc;
      padding: 24px;
      border-radius: 12px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    
    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    
    .btn-primary {
      background: linear-gradient(90deg, #11998e 0%, #38ef7d 100%);
      color: white;
      box-shadow: 0 4px 15px rgba(17, 153, 142, 0.3);
    }
    
    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(17, 153, 142, 0.4);
    }
    
    .btn-secondary {
      background: linear-gradient(90deg, var(--accent-orange) 0%, #f5576c 100%);
      color: white;
    }
    
    .btn-export {
      background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
      color: white;
      position: fixed;
      bottom: 30px;
      right: 30px;
      box-shadow: 0 4px 15px rgba(79, 172, 254, 0.4);
      z-index: 100;
    }
    
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none !important;
    }
    
    .status {
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    
    .status.loading {
      background: #fef3c7;
      color: #92400e;
    }
    
    .status.success {
      background: #d1fae5;
      color: #065f46;
    }
    
    .status.error {
      background: #fee2e2;
      color: #991b1b;
    }
    
    /* Results */
    .result-section {
      margin-bottom: 32px;
    }
    
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--border);
    }
    
    .section-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .badge {
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
    }
    
    .badge-ebook {
      background: #d1fae5;
      color: #065f46;
    }
    
    .badge-db {
      background: #dbeafe;
      color: #1e40af;
    }
    
    /* Tab 2: Book Search Layout - Excel Style */
    .search-layout {
      display: grid;
      grid-template-columns: 350px 1fr;
      gap: 24px;
      height: calc(100vh - 200px);
      min-height: 600px;
    }
    
    .search-sidebar {
      background: #f8fafc;
      padding: 24px;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
    }
    
    .input-label {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-muted);
    }
    
    .book-input {
      width: 100%;
      flex: 1;
      padding: 16px;
      border: 2px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      font-family: 'Courier New', monospace;
      resize: none;
      transition: border-color 0.3s;
    }
    
    .book-input:focus {
      outline: none;
      border-color: var(--primary);
    }
    
    .input-hint {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.4;
    }
    
    /* Excel Table Container */
    .excel-container {
      background: white;
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    
    .excel-header {
      background: #f8fafc;
      padding: 16px 20px;
      border-bottom: 2px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .excel-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .excel-stats {
      font-size: 13px;
      color: var(--text-muted);
    }
    
    .excel-table-wrapper {
      overflow: auto;
      flex: 1;
      padding: 0;
    }
    
    /* Excel Style Table */
    .excel-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      table-layout: fixed;
    }
    
    .excel-table thead {
      position: sticky;
      top: 0;
      z-index: 10;
    }
    
    .excel-table th {
      background: linear-gradient(180deg, #f8fafc 0%, #edf2f7 100%);
      padding: 12px;
      text-align: left;
      font-weight: 700;
      color: var(--text);
      border-bottom: 2px solid var(--border);
      border-right: 1px solid var(--border);
      font-size: 12px;
      white-space: nowrap;
    }
    
    .excel-table th:last-child {
      border-right: none;
    }
    
    .excel-table td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      border-right: 1px solid var(--border);
      vertical-align: top;
      line-height: 1.4;
    }
    
    .excel-table td:last-child {
      border-right: none;
    }
    
    .excel-table tr:nth-child(even) {
      background: #fafbfc;
    }
    
    .excel-table tr:hover {
      background: #f0f4f8;
    }
    
    /* Column Widths */
    .col-seq { width: 50px; text-align: center; }
    .col-title { width: 25%; }
    .col-id { width: 120px; }
    .col-call { width: 120px; }
    .col-count { width: 80px; text-align: center; }
    .col-dist { width: 40%; }
    
    /* Cell Content Styles */
    .cell-title {
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
    }
    
    .cell-id {
      font-family: 'Courier New', monospace;
      font-size: 12px;
      color: var(--text-muted);
    }
    
    .cell-count {
      text-align: center;
      font-weight: 700;
      font-size: 14px;
    }
    
    .cell-count .available {
      color: var(--success);
      font-size: 11px;
      display: block;
      margin-top: 2px;
    }
    
    /* Distribution Cell */
    .dist-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    
    .dist-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
      border-bottom: 1px dotted var(--border);
      font-size: 12px;
    }
    
    .dist-item:last-child {
      border-bottom: none;
    }
    
    .dist-lib {
      font-weight: 600;
      color: var(--text);
      min-width: 100px;
    }
    
    .dist-call {
      font-family: 'Courier New', monospace;
      color: var(--text-muted);
      min-width: 80px;
      font-size: 11px;
    }
    
    .dist-status {
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
    }
    
    .dist-status.available {
      background: #d1fae5;
      color: #065f46;
    }
    
    .dist-status.loaned {
      background: #fef3c7;
      color: #92400e;
    }
    
    .dist-status.reserve {
      background: #fee2e2;
      color: #991b1b;
    }
    
    .dist-status.processing {
      background: #dbeafe;
      color: #1e40af;
    }
    
    .dist-loc {
      color: var(--text-muted);
      font-size: 11px;
    }
    
    /* Progress Bar */
    .progress-bar {
      width: 100%;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 16px 0;
      overflow: hidden;
    }
    
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary) 0%, var(--secondary) 100%);
      transition: width 0.3s;
    }
    
    /* Loading Overlay */
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(255,255,255,0.9);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      backdrop-filter: blur(4px);
    }
    
    .loading-overlay.show {
      display: flex;
    }
    
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      background: #f8fafc;
      border-radius: 8px;
      border: 2px dashed var(--border);
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    
    /* Responsive */
    @media (max-width: 968px) {
      .search-layout {
        grid-template-columns: 1fr;
        height: auto;
      }
      
      .btn-export {
        bottom: 20px;
        right: 20px;
      }
      
      .network-status {
        position: static;
        margin-top: 10px;
        justify-content: center;
      }
      
      .excel-table th,
      .excel-table td {
        padding: 8px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
  </div>

  <div class="container">
    <div class="header">
      <div style="display: flex; justify-content: space-between; align-items: flex-start;">
        <div style="flex: 1;">
          <h1>HKPL 資源控制台 v2.2</h1>
          <p>香港公共圖書館電子資源 & 館藏查詢系統 (Excel 表格版)</p>
        </div>
        <div class="network-status" id="networkStatus">
          <span class="status-dot"></span>
          <span id="networkText">網絡連線正常</span>
        </div>
      </div>
    </div>
    
    <!-- Tab Navigation -->
    <div class="tab-nav">
      <button class="tab-btn active" onclick="switchTab('scrape', this)">
        📡 抓取 HKPL 電子資源
      </button>
      <button class="tab-btn" onclick="switchTab('books', this)">
        📚 查詢書籍 (Excel)
      </button>
    </div>
    
    <!-- Tab 1: Scrape -->
    <div id="tab-scrape" class="tab-content active">
      <div class="auto-fetch-banner" id="autoFetchBanner">
        <div class="message">
          <svg width="20" height="20" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-12a1 1 0 10-2 0v4a1 1 0 00.293.707l2.828 2.829a1 1 0 101.415-1.415L11 9.586V6z" clip-rule="evenodd"/>
          </svg>
          <span id="autoFetchMsg">系統正在自動連接 API...</span>
        </div>
        <button class="btn btn-primary" onclick="fetchData()" style="padding: 8px 16px; font-size: 13px;">
          立即手動刷新
        </button>
      </div>

      <div class="control-panel">
        <button class="btn btn-primary" onclick="fetchData()" id="btnFetch">
          <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
            <path d="M11.534 7h3.932a.25.25 0 0 1 .192.41l-1.966 2.36a.25.25 0 0 1-.384 0l-1.966-2.36a.25.25 0 0 1 .192-.41zm-11 2h3.932a.25.25 0 0 0 .192-.41L2.692 6.23a.25.25 0 0 0-.384 0L.342 8.59A.25.25 0 0 0 .534 9z"/>
            <path fill-rule="evenodd" d="M8 3c-1.552 0-2.94.707-3.857 1.818a.5.5 0 1 1-.771-.636A6.002 6.002 0 0 1 13.917 7H12.9A5.002 5.002 0 0 0 8 3zM3.1 9a5.002 5.002 0 0 0 8.757 2.182.5.5 0 1 1 .771.636A6.002 6.002 0 0 1 2.083 9H3.1z"/>
          </svg>
          抓取 HKPL 電子資源 (API 1)
        </button>
        <span class="status" id="status">就緒</span>
        <span id="lastUpdate" style="margin-left: auto; font-size: 12px; color: var(--text-muted);"></span>
      </div>
      
      <div class="result-section">
        <div class="section-header">
          <div class="section-title">
            <span>📖</span>
            電子書平台
          </div>
          <span class="badge badge-ebook" id="ebookCount">0 個</span>
        </div>
        <div id="ebookResult">
          <div class="empty-state">等待數據載入...<br><small>頁面載入後將自動連接 API</small></div>
        </div>
      </div>
      
      <div class="result-section">
        <div class="section-header">
          <div class="section-title">
            <span>🗄️</span>
            電子資料庫
          </div>
          <span class="badge badge-db" id="dbCount">0 個</span>
        </div>
        <div id="dbResult">
          <div class="empty-state">等待數據載入...<br><small>即將自動抓取</small></div>
        </div>
      </div>
    </div>
    
    <!-- Tab 2: Book Search - Excel Style -->
    <div id="tab-books" class="tab-content">
      <div class="search-layout">
        <!-- Left: Input -->
        <div class="search-sidebar">
          <div class="input-group">
            <label class="input-label">書籍 ID 輸入</label>
            <textarea 
              class="book-input" 
              id="bookInput" 
              placeholder="請輸入書籍 ID...
支援格式：
• 單一 ID：3780306
• 多個 ID（換行分隔）：
  3780306
  3780307
  3780308
• 或逗號分隔：3780306, 3780307, 3780308"
            ></textarea>
            <div class="input-hint">
              支援單一查詢或批量查詢（換行、逗號、空格分隔）
            </div>
          </div>
          
          <button class="btn btn-secondary" onclick="fetchBookData()" id="btnBookSearch" style="width: 100%; justify-content: center;">
            <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
              <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z"/>
            </svg>
            查詢書籍
          </button>
          
          <button class="btn" onclick="clearBookInput()" style="width: 100%; background: var(--border); color: var(--text);">
            清空輸入
          </button>
          
          <div class="status" id="bookStatus" style="display: none;"></div>
          
          <div class="progress-bar" id="progressBar" style="display: none;">
            <div class="progress-fill" id="progressFill" style="width: 0%"></div>
          </div>
        </div>
        
        <!-- Right: Excel Table Results -->
        <div class="excel-container" id="bookResultsContainer">
          <div class="excel-header">
            <div class="excel-title">
              <span>📊</span>
              查詢結果 (Excel 格式)
            </div>
            <div class="excel-stats" id="excelStats">等待查詢...</div>
          </div>
          
          <div class="excel-table-wrapper" id="bookResults">
            <div class="empty-state">
              <div style="font-size: 48px; margin-bottom: 16px;">📚</div>
              請在左側輸入書籍 ID 並點擊「查詢書籍」<br>
              <small>結果將以 Excel 表格形式顯示於此</small>
            </div>
          </div>
        </div>
      </div>
      
      <!-- Export Button (Floating) -->
      <button class="btn btn-export" onclick="exportToExcel()" id="btnExport" style="display: none;">
        <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
          <path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"/>
          <path d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708l3 3z"/>
        </svg>
        滙出 Excel
      </button>
    </div>
  </div>

  <script>
    // Global storage for current data
    let currentBookData = [];
    let currentScrapeData = null;
    let isFirstLoad = true;
    
    // Tab Switching
    function switchTab(tabName, btnElement) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
      
      document.getElementById('tab-' + tabName).classList.add('active');
      if (btnElement) btnElement.classList.add('active');
    }
    
    // Network Status Monitoring
    function updateNetworkStatus() {
      const statusEl = document.getElementById('networkStatus');
      const textEl = document.getElementById('networkText');
      
      if (navigator.onLine) {
        statusEl.classList.remove('offline');
        textEl.textContent = '網絡連線正常';
      } else {
        statusEl.classList.add('offline');
        textEl.textContent = '離線狀態';
      }
    }
    
    window.addEventListener('online', () => {
      updateNetworkStatus();
      const scrapeTab = document.getElementById('tab-scrape');
      if (scrapeTab && scrapeTab.classList.contains('active')) {
        setStatus('網絡已恢復，正在自動刷新...', 'loading');
        setTimeout(() => fetchData(), 1000);
      }
    });
    
    window.addEventListener('offline', () => {
      updateNetworkStatus();
      setStatus('網絡已斷開', 'error');
    });
    
    // Loading Control
    function setLoading(show) {
      document.getElementById('loadingOverlay').classList.toggle('show', show);
      document.getElementById('btnFetch').disabled = show;
      document.getElementById('btnBookSearch').disabled = show;
    }
    
    // Status Control
    function setStatus(msg, type, elementId = 'status') {
      const el = document.getElementById(elementId);
      if (!el) return;
      el.textContent = msg;
      el.className = 'status show ' + type;
      
      if (type === 'success' || type === 'error') {
        setTimeout(() => { if (el) el.className = 'status'; }, 5000);
      }
    }
    
    // Auto Fetch on Page Load
    window.addEventListener('DOMContentLoaded', function() {
      updateNetworkStatus();
      if (navigator.onLine) {
        setTimeout(() => fetchData(true), 1000);
      }
    });
    
    // Parse Book IDs
    function parseBookIds() {
      const input = document.getElementById('bookInput').value;
      const ids = input.split(/[\n\r,，\s\t]+/)
        .map(id => id.trim())
        .filter(id => id.length > 0 && /^\d+$/.test(id));
      return [...new Set(ids)];
    }
    
    // Clear Input
    function clearBookInput() {
      document.getElementById('bookInput').value = '';
      document.getElementById('bookResults').innerHTML = `
        <div class="empty-state">
          <div style="font-size: 48px; margin-bottom: 16px;">📚</div>
          請在左側輸入書籍 ID 並點擊「查詢書籍」<br>
          <small>結果將以 Excel 表格形式顯示於此</small>
        </div>
      `;
      document.getElementById('excelStats').textContent = '等待查詢...';
      document.getElementById('btnExport').style.display = 'none';
      currentBookData = [];
    }
    
    // Fetch Book Data (Excel Style Display)
    async function fetchBookData() {
      const ids = parseBookIds();
      
      if (ids.length === 0) {
        setStatus('請輸入有效的書籍 ID（數字格式）', 'error', 'bookStatus');
        return;
      }
      
      currentBookData = [];
      setLoading(true);
      setStatus(`準備查詢 ${ids.length} 個書籍...`, 'loading', 'bookStatus');
      
      // Initialize Excel Table Structure
      const container = document.getElementById('bookResults');
      container.innerHTML = `
        <table class="excel-table" id="excelTable">
          <thead>
            <tr>
              <th class="col-seq">序號</th>
              <th class="col-title">書本名稱</th>
              <th class="col-id">館藏編目號碼</th>
              <th class="col-call">索書號</th>
              <th class="col-count">館藏數量</th>
              <th class="col-dist">館藏分佈（圖書館 | 索書號 | 狀態 | 位置）</th>
            </tr>
          </thead>
          <tbody id="excelTableBody">
            <!-- Data rows will be inserted here -->
          </tbody>
        </table>
      `;
      
      const tbody = document.getElementById('excelTableBody');
      
      // Show progress bar for batch
      if (ids.length > 1) {
        document.getElementById('progressBar').style.display = 'block';
      }
      
      // Process sequentially
      for (let i = 0; i < ids.length; i++) {
        const id = ids[i];
        
        // Update progress
        if (ids.length > 1) {
          const progress = ((i / ids.length) * 100).toFixed(0);
          document.getElementById('progressFill').style.width = progress + '%';
          setStatus(`查詢中... (${i + 1}/${ids.length}) ID: ${id}`, 'loading', 'bookStatus');
        }
        
        try {
          const data = await fetchSingleBook(id);
          if (data) {
            currentBookData.push({ id, ...data });
            appendExcelRow(data, i + 1, tbody);
          }
        } catch (err) {
          console.error(`Error fetching book ${id}:`, err);
          appendErrorRow(id, err.message, i + 1, tbody);
        }
        
        if (i < ids.length - 1) await new Promise(r => setTimeout(r, 300));
      }
      
      // Complete
      document.getElementById('progressBar').style.display = 'none';
      document.getElementById('progressFill').style.width = '0%';
      
      if (currentBookData.length > 0) {
        setStatus(`查詢完成！成功獲取 ${currentBookData.length} 本書籍資料`, 'success', 'bookStatus');
        document.getElementById('excelStats').textContent = `共 ${currentBookData.length} 本書籍 | ${new Date().toLocaleTimeString()} 更新`;
        document.getElementById('btnExport').style.display = 'inline-flex';
      } else {
        setStatus('查詢完成，但未獲取到任何資料', 'error', 'bookStatus');
      }
      
      setLoading(false);
    }
    
    // API Call for Single Book
    function fetchSingleBook(id) {
      return new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        xhr.open('GET', '/api/proxy?target=8081&endpoint=book/' + encodeURIComponent(id), true);
        xhr.setRequestHeader('X-API-Key', 'HKPL2024SecureKey');
        
        xhr.onreadystatechange = function() {
          if (xhr.readyState === 4) {
            if (xhr.status === 200) {
              try {
                const result = JSON.parse(xhr.responseText);
                resolve(result.data || result);
              } catch (e) {
                reject(new Error('數據解析失敗'));
              }
            } else if (xhr.status === 404) {
              reject(new Error('找不到書籍'));
            } else {
              reject(new Error(`HTTP ${xhr.status}`));
            }
          }
        };
        
        xhr.onerror = () => reject(new Error('網絡錯誤'));
        xhr.send();
      });
    }
    
    // Append Excel Style Row
    function appendExcelRow(data, seq, tbody) {
      const details = data['書目詳情'] || {};
      const libraries = data['館藏列表'] || [];
      
      // Calculate available count
      const available = libraries.filter(l => l['館藏現況'] && l['館藏現況'].includes('可供借閱')).length;
      
      // Build distribution list
      let distHtml = '<div class="dist-list">';
      if (libraries.length > 0) {
        libraries.forEach(lib => {
          let statusClass = 'processing';
          const status = lib['館藏現況'] || '--';
          if (status.includes('可供借閱')) statusClass = 'available';
          else if (status.includes('已借出')) statusClass = 'loaned';
          else if (status.includes('預約')) statusClass = 'reserve';
          
          distHtml += `
            <div class="dist-item">
              <span class="dist-lib">${escapeHtml(lib['圖書館'] || '--')}</span>
              <span class="dist-call">${escapeHtml(lib['索書號'] || '--')}</span>
              <span class="dist-status ${statusClass}">${escapeHtml(status)}</span>
              <span class="dist-loc">${escapeHtml(lib['館藏'] || '--')}</span>
            </div>
          `;
        });
      } else {
        distHtml += '<div class="dist-item" style="color: var(--text-muted);">無館藏資料</div>';
      }
      distHtml += '</div>';
      
      const row = document.createElement('tr');
      row.innerHTML = `
        <td class="col-seq" style="text-align: center; font-weight: 700;">${seq}</td>
        <td class="col-title">
          <div class="cell-title">${escapeHtml(data['書本名稱'] || '未知書名')}</div>
        </td>
        <td class="col-id">
          <div class="cell-id">${escapeHtml(details['館藏編目號碼'] || '--')}</div>
        </td>
        <td class="col-call">
          <div class="cell-id">${escapeHtml(details['索書號'] || '--')}</div>
        </td>
        <td class="col-count">
          <div class="cell-count">
            ${libraries.length}
            ${available > 0 ? `<span class="available">(${available} 可借)</span>` : ''}
          </div>
        </td>
        <td class="col-dist">${distHtml}</td>
      `;
      
      tbody.appendChild(row);
    }
    
    // Append Error Row
    function appendErrorRow(id, error, seq, tbody) {
      const row = document.createElement('tr');
      row.style.background = '#fee2e2';
      row.innerHTML = `
        <td class="col-seq" style="text-align: center;">${seq}</td>
        <td colspan="5" style="color: var(--danger); font-weight: 600;">
          ❌ ID: ${id} - ${escapeHtml(error)}
        </td>
      `;
      tbody.appendChild(row);
    }
    
    // Export to Excel
    function exportToExcel() {
      if (!currentBookData || currentBookData.length === 0) {
        alert('沒有可滙出的資料');
        return;
      }
      
      // Format data for Excel
      const rows = [];
      
      currentBookData.forEach((book, idx) => {
        const details = book['書目詳情'] || {};
        const libraries = book['館藏列表'] || [];
        
        // For Excel export, we expand each library as a separate row for better filtering
        // but keep the book info repeated (flat table structure)
        if (libraries.length === 0) {
          rows.push({
            '序號': idx + 1,
            '書籍ID': book.id,
            '書本名稱': book['書本名稱'] || '',
            '館藏編目號碼': details['館藏編目號碼'] || '',
            '索書號': details['索書號'] || '',
            '館藏數量': 0,
            '可借閱數': 0,
            '圖書館': '',
            '館藏索書號': '',
            '館藏現況': '',
            '館藏位置': ''
          });
        } else {
          const available = libraries.filter(l => l['館藏現況'] && l['館藏現況'].includes('可供借閱')).length;
          libraries.forEach((lib, libIdx) => {
            rows.push({
              '序號': idx + 1,
              '書籍ID': book.id,
              '書本名稱': book['書本名稱'] || '',
              '館藏編目號碼': details['館藏編目號碼'] || '',
              '索書號': details['索書號'] || '',
              '館藏數量': libraries.length,
              '可借閱數': available,
              '圖書館': lib['圖書館'] || '',
              '館藏索書號': lib['索書號'] || '',
              '館藏現況': lib['館藏現況'] || '',
              '館藏位置': lib['館藏'] || ''
            });
          });
        }
      });
      
      // Create worksheet
      const ws = XLSX.utils.json_to_sheet(rows);
      
      // Auto-width
      const colWidths = [];
      const keys = Object.keys(rows[0] || {});
      keys.forEach((key, i) => {
        const maxLength = Math.max(
          key.length,
          ...rows.map(r => String(r[key] || '').length)
        );
        colWidths[i] = { wch: Math.min(maxLength + 2, 50) };
      });
      ws['!cols'] = colWidths;
      
      // Create workbook
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'HKPL館藏查詢');
      
      // Generate filename with timestamp
      const date = new Date().toISOString().slice(0, 10).replace(/-/g, '');
      const filename = `HKPL_Books_${date}_${currentBookData.length}本.xlsx`;
      
      // Download
      XLSX.writeFile(wb, filename);
      
      setStatus(`已滙出 ${currentBookData.length} 本書籍資料到 ${filename}`, 'success', 'bookStatus');
    }
    
    // Fetch Scrape Data (Tab 1)
    function fetchData(isAuto = false) {
      setLoading(true);
      setStatus(isAuto ? '頁面載入，自動連接 API 中...' : '連接中...', 'loading');
      
      document.getElementById('ebookResult').innerHTML = '<div class="empty-state">載入中...</div>';
      document.getElementById('dbResult').innerHTML = '<div class="empty-state">載入中...</div>';
      
      const xhr = new XMLHttpRequest();
      xhr.open('POST', '/api/proxy?target=8000&endpoint=scrape', true);
      xhr.setRequestHeader('Content-Type', 'application/json');
      xhr.setRequestHeader('X-API-Key', 'HKPL2024SecureKey');
      
      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
          if (xhr.status === 200) {
            try {
              const result = JSON.parse(xhr.responseText);
              if (result.success && result.data) {
                currentScrapeData = result.data;
                renderScrapeData(result.data);
                setStatus(isAuto ? '自動抓取成功！' : '抓取成功！', 'success');
                
                const now = new Date();
                document.getElementById('lastUpdate').textContent = '最後更新: ' + now.toLocaleTimeString();
                
                if (isAuto && isFirstLoad) {
                  setTimeout(() => {
                    document.getElementById('autoFetchBanner').classList.remove('show');
                  }, 3000);
                  isFirstLoad = false;
                }
              } else {
                setStatus('數據格式錯誤', 'error');
              }
            } catch (e) {
              setStatus('解析失敗: ' + e.message, 'error');
            }
          } else {
            setStatus('連接失敗 (' + xhr.status + ')', 'error');
            if (isAuto) {
              document.getElementById('autoFetchMsg').textContent = '自動連接失敗，請點擊手動刷新';
            }
          }
          setLoading(false);
        }
      };
      
      xhr.onerror = function() {
        setStatus('網絡錯誤，請檢查 Proxy 服務', 'error');
        if (isAuto) {
          document.getElementById('autoFetchMsg').textContent = '自動連接失敗，請檢查網絡後點擊手動刷新';
        }
        setLoading(false);
      };
      
      xhr.send('{}');
    }
    
    function renderScrapeData(data) {
      const ebooks = data.ebooks || [];
      const databases = data.edatabases || [];
      
      document.getElementById('ebookCount').textContent = ebooks.length + ' 個';
      document.getElementById('dbCount').textContent = databases.length + ' 個';
      
      // Render Ebooks
      if (ebooks.length > 0) {
        const html = `
          <table style="width: 100%; border-collapse: collapse; font-size: 14px;">
            <thead>
              <tr style="background: #f8fafc;">
                <th style="padding: 14px 16px; text-align: left; border-bottom: 1px solid var(--border);">類型</th>
                <th style="padding: 14px 16px; text-align: left; border-bottom: 1px solid var(--border);">標題</th>
                <th style="padding: 14px 16px; text-align: left; border-bottom: 1px solid var(--border);">鏈接</th>
              </tr>
            </thead>
            <tbody>
              ${ebooks.map(item => {
                const cat = item.category || '電子書';
                const badgeClass = cat.includes('英文') ? 'badge-db' : 'badge-ebook';
                return `
                  <tr style="border-bottom: 1px solid var(--border);">
                    <td style="padding: 14px 16px;"><span class="badge ${badgeClass}">${escapeHtml(cat)}</span></td>
                    <td style="padding: 14px 16px;">${escapeHtml(item.title)}</td>
                    <td style="padding: 14px 16px;"><a href="${item.link || '#'}" target="_blank" style="color: var(--primary);">查看資源 →</a></td>
                  </tr>
                `;
              }).join('')}
            </tbody>
          </table>
        `;
        document.getElementById('ebookResult').innerHTML = html;
      } else {
        document.getElementById('ebookResult').innerHTML = '<div class="empty-state">無電子書數據</div>';
      }
      
      // Render Databases
      if (databases.length > 0) {
        const html = `
          <table style="width: 100%; border-collapse: collapse; font-size: 14px;">
            <thead>
              <tr style="background: #f8fafc;">
                <th style="padding: 14px 16px; text-align: left; border-bottom: 1px solid var(--border);">標題</th>
                <th style="padding: 14px 16px; text-align: left; border-bottom: 1px solid var(--border);">使用地點</th>
                <th style="padding: 14px 16px; text-align: left; border-bottom: 1px solid var(--border);">標籤</th>
              </tr>
            </thead>
            <tbody>
              ${databases.map(db => {
                const locs = db.locations || [];
                const tags = db.tags || [];
                const locHtml = locs.length > 0 
                  ? locs.map(l => `<span class="badge" style="background: #e2e8f0; color: var(--text); margin: 2px; display: inline-block;">${escapeHtml(l)}</span>`).join('')
                  : '<span style="color: var(--text-muted);">-</span>';
                const tagStr = tags.slice(0, 5).join(', ') + (tags.length > 5 ? '...' : '');
                
                return `
                  <tr style="border-bottom: 1px solid var(--border);">
                    <td style="padding: 14px 16px;"><strong>${escapeHtml(db.title)}</strong></td>
                    <td style="padding: 14px 16px;">${locHtml}</td>
                    <td style="padding: 14px 16px;">${escapeHtml(tagStr)}</td>
                  </tr>
                `;
              }).join('')}
            </tbody>
          </table>
        `;
        document.getElementById('dbResult').innerHTML = html;
      } else {
        document.getElementById('dbResult').innerHTML = '<div class="empty-state">無數據庫數據</div>';
      }
    }
    
    // Utility: Escape HTML
    function escapeHtml(text) {
      if (!text) return '--';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter' && document.getElementById('tab-books').classList.contains('active')) {
        fetchBookData();
      }
    });
  </script>
</body>
</html>
