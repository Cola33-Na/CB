<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>控制台 - 終極調試版</title>
  <style>
    body { font-family: "Microsoft YaHei", sans-serif; background: #667eea; padding: 20px; margin: 0; }
    .container { max-width: 1200px; margin: 0 auto; background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 30px; text-align: center; }
    .controls { padding: 30px; background: #f8f9fa; border-bottom: 1px solid #e9ecef; }
    .btn { padding: 14px 28px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; background: #11998e; color: white; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .results { padding: 30px; }
    
    /* 調試面板 */
    .debug-box { 
      background: #1e1e1e; color: #d4d4d4; font-family: "Consolas", monospace; 
      font-size: 12px; padding: 15px; border-radius: 8px; margin: 15px 0;
      max-height: 400px; overflow-y: auto; white-space: pre-wrap; word-break: break-all;
    }
    .debug-title { color: #569cd6; font-weight: bold; margin-bottom: 10px; }
    .debug-success { color: #4ec9b0; }
    .debug-error { color: #f44747; }
    .debug-warn { color: #dcdcaa; }
    
    .raw-response {
      background: #f8f9fa; border: 2px solid #dee2e6; border-radius: 8px;
      padding: 15px; margin: 15px 0; font-family: monospace; font-size: 11px;
      max-height: 300px; overflow-y: auto; white-space: pre-wrap; word-break: break-all;
    }
    
    .data-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
    .data-table th, .data-table td { padding: 10px; border: 1px solid #dee2e6; text-align: left; }
    .data-table th { background: #e9ecef; }
    .empty { text-align: center; color: #6c757d; padding: 40px; font-style: italic; }
    
    .alert { padding: 15px; border-radius: 8px; margin: 10px 0; }
    .alert-danger { background: #f8d7da; color: #721c24; }
    .alert-success { background: #d4edda; color: #155724; }
    .alert-warning { background: #fff3cd; color: #856404; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🖥️ 控制台 (終極調試版)</h1>
      <p>顯示原始響應數據流</p>
    </div>
    
    <div class="controls">
      <button class="btn" onclick="callAPI1()" id="btn1">📚 抓取 HKPL 資源</button>
      
      <!-- 步驟 1: 原始響應 -->
      <div class="raw-response" id="rawResponse" style="display:none;">
        <strong>📄 原始響應文本 (Raw Response):</strong>
        <div id="rawContent" style="margin-top:10px;"></div>
      </div>
      
      <!-- 步驟 2: 解析後結構 -->
      <div class="debug-box" id="parsedBox" style="display:none;">
        <div class="debug-title">🔍 解析後的結構 (Parsed Structure)</div>
        <div id="parsedContent"></div>
      </div>
      
      <!-- 步驟 3: 錯誤信息 -->
      <div id="errorBox" style="display:none;"></div>
    </div>
    
    <div class="results">
      <h3 style="border-left:4px solid #667eea; padding-left:10px; color:#495057;">API 1 結果</h3>
      <div id="finalResult">
        <p class="empty">點擊按鈕開始調試</p>
      </div>
    </div>
  </div>

  <script>
    function getEl(id) { return document.getElementById(id); }
    
    function log(containerId, msg, type) {
      var el = getEl(containerId);
      var time = new Date().toLocaleTimeString();
      var colorClass = type === 'error' ? 'debug-error' : type === 'success' ? 'debug-success' : 'debug-warn';
      el.innerHTML += '<div class="' + colorClass + ">[" + time + "] " + msg + '</div>';
      console.log("[" + time + "]", msg);
    }

    function callAPI1() {
      getEl('btn1').disabled = true;
      getEl('finalResult').innerHTML = '<p class="empty">載入中...</p>';
      getEl('rawResponse').style.display = 'none';
      getEl('parsedBox').style.display = 'none';
      getEl('errorBox').style.display = 'none';
      getEl('rawContent').innerHTML = '';
      getEl('parsedContent').innerHTML = '';
      
      var xhr = new XMLHttpRequest();
      xhr.open('POST', '/api/proxy?target=8000&endpoint=scrape', true);
      xhr.setRequestHeader('Content-Type', 'application/json');
      xhr.setRequestHeader('X-API-Key', 'HKPL2024SecureKey');
      
      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
          // 顯示原始響應
          getEl('rawResponse').style.display = 'block';
          getEl('rawContent').textContent = xhr.responseText || '(空響應)';
          
          if (xhr.status !== 200) {
            getEl('errorBox').style.display = 'block';
            getEl('errorBox').innerHTML = '<div class="alert alert-danger">HTTP 錯誤: ' + xhr.status + '</div>';
            getEl('finalResult').innerHTML = '<p class="empty">連接失敗</p>';
            getEl('btn1').disabled = false;
            return;
          }
          
          try {
            var result = JSON.parse(xhr.responseText);
            getEl('parsedBox').style.display = 'block';
            
            // 詳細分析結構
            var analysis = '';
            analysis += 'result 類型: ' + typeof result + '\n';
            analysis += 'result 為 null: ' + (result === null) + '\n';
            analysis += 'result 有 success: ' + ('success' in result) + ' = ' + result.success + '\n';
            analysis += 'result 有 data: ' + ('data' in result) + '\n';
            
            if (result.data) {
              analysis += '  → data 類型: ' + typeof result.data + '\n';
              analysis += '  → data 為 null: ' + (result.data === null) + '\n';
              analysis += '  → data 有 ebooks: ' + ('ebooks' in result.data) + '\n';
              analysis += '  → data 有 edatabases: ' + ('edatabases' in result.data) + '\n';
              analysis += '  → data 有 total_ebooks: ' + ('total_ebooks' in result.data) + ' = ' + result.data.total_ebooks + '\n';
              analysis += '  → data 有 total_databases: ' + ('total_databases' in result.data) + ' = ' + result.data.total_databases + '\n';
              
              // 檢查 ebooks 數組
              if (result.data.ebooks) {
                analysis += '  → ebooks 長度: ' + result.data.ebooks.length + '\n';
                if (result.data.ebooks.length > 0) {
                  analysis += '  → ebooks[0].title = ' + result.data.ebooks[0].title + '\n';
                }
              }
            }
            
            log('parsedContent', analysis, 'warn');
            
            // 嘗試渲染
            if (result.success && result.data) {
              renderData(result.data);
            } else {
              getEl('errorBox').style.display = 'block';
              getEl('errorBox').innerHTML = '<div class="alert alert-warning">響應結構異常: success=' + result.success + ', data=' + result.data + '</div>';
            }
            
          } catch (e) {
            getEl('parsedBox').style.display = 'block';
            log('parsedContent', 'JSON 解析錯誤: ' + e.message, 'error');
            getEl('errorBox').style.display = 'block';
            getEl('errorBox').innerHTML = '<div class="alert alert-danger">JSON 解析失敗: ' + e.message + '</div>';
          }
          
          getEl('btn1').disabled = false;
        }
      };
      
      xhr.onerror = function() {
        getEl('errorBox').style.display = 'block';
        getEl('errorBox').innerHTML = '<div class="alert alert-danger">網絡錯誤 (CORS 或連接失敗)</div>';
        getEl('btn1').disabled = false;
      };
      
      xhr.send(JSON.stringify({}));
    }
    
    function renderData(data) {
      var html = '';
      
      // 統計卡片
      var ebookCount = data.total_ebooks !== undefined ? data.total_ebooks : (data.ebooks ? data.ebooks.length : 0);
      var dbCount = data.total_databases !== undefined ? data.total_databases : (data.edatabases ? data.edatabases.length : 0);
      
      html += '<div class="alert alert-success">';
      html += '📚 電子書: <strong>' + ebookCount + '</strong> 個 | ';
      html += '🗄️ 數據庫: <strong>' + dbCount + '</strong> 個';
      html += '</div>';
      
      // 電子書表格
      if (data.ebooks && data.ebooks.length > 0) {
        html += '<h4>電子書列表 (' + data.ebooks.length + ')</h4>';
        html += '<table class="data-table"><thead><tr><th>#</th><th>類型</th><th>標題</th><th>鏈接</th></tr></thead><tbody>';
        
        data.ebooks.forEach(function(item, idx) {
          html += '<tr>';
          html += '<td>' + (idx + 1) + '</td>';
          html += '<td>' + (item.category || '-') + '</td>';
          html += '<td>' + item.title + '</td>';
          html += '<td><a href="' + (item.link || '#') + '" target="_blank">查看</a></td>';
          html += '</tr>';
        });
        
        html += '</tbody></table>';
      } else {
        html += '<p class="empty">無電子書數據</p>';
      }
      
      // 數據庫表格
      if (data.edatabases && data.edatabases.length > 0) {
        html += '<h4 style="margin-top:20px;">數據庫列表 (' + data.edatabases.length + ')</h4>';
        html += '<table class="data-table"><thead><tr><th>標題</th><th>使用地點</th></tr></thead><tbody>';
        
        data.edatabases.forEach(function(item) {
          html += '<tr>';
          html += '<td>' + item.title + '</td>';
          html += '<td>' + (item.locations ? item.locations.slice(0, 2).join(', ') : '-') + '</td>';
          html += '</tr>';
        });
        
        html += '</tbody></table>';
      } else {
        html += '<p class="empty" style="margin-top:20px;">無數據庫數據 (後端抓取邏輯需修正)</p>';
      }
      
      getEl('finalResult').innerHTML = html;
    }
  </script>
</body>
</html>
